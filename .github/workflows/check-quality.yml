name: Code Quality

on: [push, pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8
      
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 pipeline/ scripts/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 pipeline/ scripts/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
      
      - name: Check code formatting with black
        run: black --check --diff pipeline/ scripts/ tests/ || true
      
      - name: Run tests with coverage
        run: pytest tests/ --cov=pipeline --cov-report=term-missing --cov-report=html
      
      - name: Upload coverage
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: htmlcov/
